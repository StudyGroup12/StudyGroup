name: CI / CD

# PR·push 시 빌드·테스트(CI), main push 시 Server 레포로 동기화(CD)
on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  # ── CI: 백엔드 빌드 + 테스트 ──────────────────────────────
  backend:
    name: Backend build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle (with cache)
        uses: gradle/actions/setup-gradle@v3

      - name: Build & test
        working-directory: backend
        run: |
          chmod +x ./gradlew
          ./gradlew build

  # ── CI: 프론트엔드 빌드 + 린트 ────────────────────────────
  frontend:
    name: Frontend build & lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint
        working-directory: frontend
        run: npm run lint

      - name: Build
        working-directory: frontend
        run: npm run build

  # ── CD: main 브랜치 + CI 통과 시에만 Server 레포로 동기화 ──
  deploy:
    name: Sync to StudyGroup12/Server
    needs: [backend, frontend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to Server/main
        run: |
          git remote add server https://x-access-token:${{ secrets.SERVER_SYNC_TOKEN }}@github.com/StudyGroup12/Server.git
          git push server HEAD:main --force
