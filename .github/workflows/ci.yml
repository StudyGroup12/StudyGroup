name: CI / CD

# PR·push 시 빌드·테스트(CI), main push 시 Server 레포로 동기화(CD)
on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  # ── CI: 백엔드 빌드 + 테스트 ──────────────────────────────
  backend:
    name: Backend build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle (with cache)
        uses: gradle/actions/setup-gradle@v3

      - name: Build & test
        working-directory: backend
        run: |
          chmod +x ./gradlew
          ./gradlew build

  # ── CI: 프론트엔드 빌드 + 린트 ────────────────────────────
  frontend:
    name: Frontend build & lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint
        working-directory: frontend
        run: npm run lint

      - name: Build
        working-directory: frontend
        run: npm run build

  # ── CD: main 브랜치 + CI 통과 시에만 Server 레포로 동기화 ──
  deploy:
    name: Sync to StudyGroup12/Server
    needs: [backend, frontend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # 기본 GITHUB_TOKEN(github-actions[bot]) 인증 헤더를 심지 않도록 비활성화.
          # 그래야 아래 remote URL의 SERVER_SYNC_TOKEN이 그대로 사용됨.
          persist-credentials: false

      - name: Push to Server/main (워크플로우 파일 제외)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Server 레포는 데모 실행용 미러이므로 CI/CD 워크플로우는 동기화하지 않는다.
          # (PAT에 workflow 스코프가 없으면 워크플로우 파일 push가 거부됨)
          rm -rf .github/workflows
          git add -A
          git commit -m "deploy: sync from StudyGroup (워크플로우 제외)" || true
          git remote add server https://x-access-token:${{ secrets.SERVER_SYNC_TOKEN }}@github.com/StudyGroup12/Server.git
          git push server HEAD:main --force
