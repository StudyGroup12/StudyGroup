spring:
  datasource:
    url: jdbc:h2:file:./data/studygroup;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

jwt:
  secret: ${JWT_SECRET:local-dev-secret-key-change-this-in-production-minimum-32chars}
  access-expiration: 1800000    # 30분
  refresh-expiration: 604800000 # 7일

server:
  port: 8080
  # 리버스 프록시(Codespaces 포워딩) 뒤에서 X-Forwarded-* 헤더를 존중해
  # 리다이렉트/절대 URL을 localhost가 아닌 외부 도메인으로 생성 (H2 콘솔 등)
  forward-headers-strategy: framework
